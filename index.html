<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waseem Mohammed — Senior Technical Architect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Waseem Mohammed — Senior Technical Architect. 19+ years architecting enterprise solutions across Adobe Experience Manager, Azure, AWS, and AI-guided engineering.">
  <meta name="theme-color" content="#FAFAF7">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23156B4F'/><text x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='bold' fill='%23FAFAF7' text-anchor='middle'>W</text></svg>">

  <!-- Open Graph -->
  <meta property="og:title" content="Waseem Mohammed — Senior Technical Architect">
  <meta property="og:description" content="19+ years architecting enterprise solutions. Now guiding AI to ship them.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="avatar.webp">
  <meta property="og:image:width" content="640">
  <meta property="og:image:height" content="640">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Waseem Mohammed — Senior Technical Architect">
  <meta name="twitter:description" content="19+ years architecting enterprise solutions. Now guiding AI to ship them.">
  <meta name="twitter:image" content="avatar.webp">

  <!-- Fonts — loaded asynchronously to avoid render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  </noscript>

  <!-- Critical CSS inline: covers the loading screen visible before JS runs -->
  <style>
    :root{--bg:#FAFAF7;--paper:#EFEEE8;--line:#E2E0D8;--ink:#14110E;--inkSoft:#5A554C;--accent:#156B4F;--pop:#C9325C;--mono:'JetBrains Mono',ui-monospace,monospace}
    html,body{margin:0;padding:0;min-height:100%;background:var(--bg)}
    .px-loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-family:var(--mono);font-size:12px;color:var(--inkSoft);letter-spacing:.12em;text-transform:uppercase}
    .px-loading.error{flex-direction:column;text-align:center;padding:0 24px;gap:12px}
    .px-loading.error b{color:var(--pop);font-weight:600}
    .px-loading code{font-size:11px;background:var(--paper);padding:4px 8px;border-radius:6px}
  </style>
  <!-- Full stylesheet deferred — does not block first paint -->
  <link rel="preload" as="style" href="styles.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.min.css"></noscript>
</head>
<body>
  <div id="root">
    <div class="px-loading">Loading content…</div>
  </div>

  <!-- YAML parser + app — deferred so they don't block initial paint -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" defer></script>
  <script src="app.min.js" defer></script>
</body>
</html>
