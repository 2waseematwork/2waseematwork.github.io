  eyebrow: 02 — AI + Engineering Mind
  headline: |
    Vibe coding doesn't ship.
    *Engineering minds* do.

  paragraph_1: >
    AI agents are extraordinary collaborators — but they're not architects.
    They don't know which integration will buckle under load, which auth flow
    leaks data, or which caching strategy will silently corrupt your CDN. That
    intuition comes from {years} years of shipping real systems for real users.

  paragraph_2: >
    I guide AI the way I guide engineering teams: with context about secure
    data flow, points of failure, performance ceilings, and the hundred
    non-obvious tradeoffs that separate a demo from a product. Detailed
    prompting isn't enough. You need a mind that's been there.

